<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Classic mode — Type War</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<link rel="stylesheet" href="style.css">
<style>
/* ================================================================
   OVERRIDES — fix conflicts from style.css
   ================================================================ */

/* style.css sets #inputbox { display:none } — we MUST override it.
   The input is off-screen but fully rendered so it can receive focus. */
#inputbox {
  display: block !important;
  position: fixed !important;
  left: -9999px !important;
  top: 0 !important;
  width: 1px !important;
  height: 1px !important;
  opacity: 0 !important;
  pointer-events: auto !important;
  z-index: 0 !important;
}

/* Remove the old slider + number layout from #start */
#start {
  display: flex !important;
  flex-direction: column !important;
  align-items: center !important;
  gap: 12px !important;
  margin-top: 14px !important;
}

/* Hide slider elements that come from old code — we don't use them */
#setnum, #storeval {
  display: none !important;
}

/* ================================================================
   NEW FEATURE STYLES
   ================================================================ */

/* Selector rows (diff / time / word-count) */
.sel-row {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 8px;
  position: relative;
  z-index: 1;
  margin: 12px auto 0;
}

.sel-btn {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 6px 14px;
  border-radius: var(--r-sm);
  cursor: pointer;
  transition:
    border-color var(--t-base) var(--ease),
    color        var(--t-base) var(--ease),
    background   var(--t-base) var(--ease),
    box-shadow   var(--t-base) ease;
}
.sel-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
}
.sel-btn.active {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(0,232,122,.08);
  box-shadow: 0 0 10px var(--accent-glow);
}

/* Two-line number buttons (word count + time) */
.sel-btn.num-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  padding: 8px 16px;
  min-width: 52px;
}
.sel-btn.num-btn .num {
  font-size: 18px;
  font-weight: 700;
  line-height: 1;
  color: inherit;
  letter-spacing: -0.02em;
}
.sel-btn.num-btn .lbl {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.15em;
  opacity: 0.6;
  line-height: 1;
}

/* Row label */
.row-label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--text-muted);
  text-align: center;
  margin: 14px 0 0;
  position: relative;
  z-index: 1;
}

/* Live stats */
#livestats {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 36px;
  margin: 16px auto 0;
  font-family: var(--font-mono);
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  position: relative;
  z-index: 1;
}
#live-wpm   { color: var(--accent);  text-shadow: 0 0 10px var(--accent-glow); }
#live-timer { color: var(--yellow);  text-shadow: 0 0 10px rgba(255,208,0,.4); }
#live-acc   { color: var(--text-secondary); }

/* Progress bar wrap */
#progressbar-wrap {
  max-width: 760px;
  margin: 10px auto 0;
  position: relative;
  z-index: 1;
}
progress {
  display: block !important;
  width: 100% !important;
  height: 2px !important;
  border: none !important;
  border-radius: 99px !important;
  background: var(--border) !important;
  overflow: hidden !important;
}
progress::-webkit-progress-bar   { background: var(--border); }
progress::-webkit-progress-value {
  background: var(--accent);
  border-radius: 99px;
  box-shadow: 0 0 8px var(--accent-glow);
}
progress::-moz-progress-bar {
  background: var(--accent);
  border-radius: 99px;
}

/* Override style.css .current — it uses box-shadow glow-yellow
   but we want the green cursor from the original design */
.current {
  color: var(--bg) !important;
  background: var(--accent) !important;
  border-radius: 2px !important;
  padding: 0 1px !important;
  text-shadow: none !important;
  box-shadow: 0 0 12px var(--accent-glow) !important;
  animation: cursorPulse 0.8s ease-in-out infinite !important;
}

/* Backdrop — separate div, never touches body::before */
#backdrop {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(6,8,7,.88);
  backdrop-filter: blur(12px) saturate(0.8);
  -webkit-backdrop-filter: blur(12px) saturate(0.8);
  z-index: 1000;
  cursor: pointer;
}
#backdrop.show { display: block; }

/* Popup stat layout */
#popup {
  z-index: 1001 !important;
}
#popup p {
  display: flex !important;
  align-items: center !important;
  justify-content: space-between !important;
  width: 100% !important;
  padding: 10px 0 !important;
  border-bottom: 1px solid var(--border) !important;
  font-family: var(--font-mono) !important;
  font-size: 14px !important;
  margin: 0 !important;
  color: var(--text-secondary) !important;
  /* override style.css popup p font-size:clamp(36px...) */
  text-shadow: none !important;
  letter-spacing: normal !important;
}
#popup p:last-of-type { border-bottom: none !important; }

.stat-label {
  font-size: 11px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--text-secondary);
  font-family: var(--font-mono);
  font-weight: 600;
}
.stat-val {
  font-size: 30px;
  font-weight: 700;
  color: var(--accent);
  font-family: var(--font-mono);
  text-shadow: 0 0 16px var(--accent-glow);
}
.stat-val.err  { color: var(--red);    text-shadow: var(--glow-red); }
.stat-val.best { color: var(--yellow); text-shadow: var(--glow-yellow); }

/* WPM chart */
#wpm-chart-wrap {
  margin: 14px 0 0;
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  overflow: hidden;
  background: rgba(0,0,0,.3);
}
#wpm-chart { display: block; width: 100%; height: 72px; }

/* Popup action buttons */
#popup-actions {
  display: flex;
  gap: 12px;
  margin-top: 18px;
  justify-content: center;
}
#restart-btn {
  padding: 9px 20px;
  border-radius: var(--r-sm);
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-secondary);
  font-weight: 600;
  font-family: var(--font-mono);
  font-size: 12px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all var(--t-base) var(--ease);
}
#restart-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
  transform: translateY(-2px);
}

/* ── Controls collapse animation ──────────────────── */
/*
  Strategy: wrap all controls in #controls-wrap.
  On collapse: fade opacity to 0, shrink max-height to 0,
  collapse margin/padding. No display:none — layout stays
  in flow during transition, then pointer-events are killed.
*/
#controls-wrap {
  max-height: 760px;          /* generous ceiling — adjust if you add more rows */
  overflow: hidden;
  opacity: 1;
  pointer-events: auto;
  /* Fade + collapse happen at slightly different speeds for a natural feel */
  transition:
    opacity      0.35s var(--ease),
    max-height   0.45s cubic-bezier(.4,0,.2,1),
    margin-top   0.45s cubic-bezier(.4,0,.2,1);
  margin-top: 0;              /* controlled via JS on collapse */
}

#controls-wrap.collapsed {
  max-height: 0;
  opacity: 0;
  pointer-events: none;       /* clicks fall through once invisible */
  margin-top: 0 !important;
}

/* Keep #start (generate button) visible separately so user can still restart */
#start {
  transition:
    opacity    0.35s var(--ease),
    max-height 0.45s cubic-bezier(.4,0,.2,1);
}

/* Tab hint */
#tab-hint {
  text-align: center;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 0.1em;
  margin-top: 8px;
  position: relative;
  z-index: 1;
}
#tab-hint kbd {
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 1px 5px;
  color: var(--text-secondary);
  font-size: 10px;
}

/* Online multiplayer */
.online-only {
  display: none;
}
body.online-mode #room-row {
  display: flex;
}
body.online-mode #online-status {
  display: block;
}
body.online-mode #opponent-panel {
  display: block;
}
#room-code {
  width: 142px;
  padding: 8px 12px;
  border-radius: var(--r-sm);
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--accent);
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-align: center;
  text-transform: uppercase;
  outline: none;
}
#room-code:focus {
  border-color: var(--accent);
  box-shadow: 0 0 10px var(--accent-glow);
}
#online-status {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  text-align: center;
  color: var(--text-secondary);
  margin: 8px 0 0;
  position: relative;
  z-index: 1;
}
#online-status.error {
  color: var(--red);
  text-shadow: var(--glow-red);
}
#opponent-panel {
  max-width: 760px;
  margin: 14px auto 0;
  padding: 12px 14px;
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  background: rgba(17,20,19,.72);
  font-family: var(--font-mono);
  position: relative;
  z-index: 1;
}
#opponent-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  color: var(--text-secondary);
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}
#opponent-state {
  color: var(--accent);
}
#opponent-bar {
  height: 3px;
  margin-top: 9px;
  border-radius: 99px;
  background: var(--border);
  overflow: hidden;
}
#opponent-fill {
  display: block;
  width: 0%;
  height: 100%;
  border-radius: inherit;
  background: var(--yellow);
  box-shadow: 0 0 10px rgba(255,208,0,.4);
  transition: width 0.16s ease;
}
#opponent-meta {
  margin-top: 7px;
  color: var(--text-muted);
  font-size: 10px;
  letter-spacing: 0.08em;
}
</style>
</head>
<body>

<!-- Title -->
<h1 id="title">TYPE WAR</h1>

<!-- History panel -->
<div id="History">
  <button id="his">History</button>
  <ul id="historyList"></ul>
</div>

<!-- Live stats bar -->
<div id="livestats">
  <span id="live-wpm">— WPM</span>
  <span id="live-timer">0.0s</span>
  <span id="live-acc">— %</span>
</div>

<!-- Controls wrapper — collapses smoothly when typing starts -->
<div id="controls-wrap">

  <!-- Match type -->
  <p class="row-label">Match</p>
  <div class="sel-row" id="match-row">
    <button class="sel-btn active" data-match="solo">Solo</button>
    <button class="sel-btn"        data-match="online">Online</button>
  </div>
  <div class="sel-row online-only" id="room-row">
    <input id="room-code" type="text" maxlength="16" value="TYPEWAR" aria-label="Room code">
    <button class="sel-btn" id="join-room">Join room</button>
  </div>
  <p id="online-status" class="online-only">Not connected</p>

  <!-- Difficulty -->
  <p class="row-label">Difficulty</p>
  <div class="sel-row" id="diff-row">
    <button class="sel-btn active" data-diff="easy">Easy</button>
    <button class="sel-btn"        data-diff="medium">Medium</button>
    <button class="sel-btn"        data-diff="code">Code</button>
  </div>

  <!-- Time mode -->
  <p class="row-label">Mode</p>
  <div class="sel-row" id="time-row">
    <button class="sel-btn active" data-time="0">Words</button>
    <button class="sel-btn num-btn" data-time="15"><span class="num">15</span><span class="lbl">sec</span></button>
    <button class="sel-btn num-btn" data-time="30"><span class="num">30</span><span class="lbl">sec</span></button>
    <button class="sel-btn num-btn" data-time="60"><span class="num">60</span><span class="lbl">sec</span></button>
    <button class="sel-btn num-btn" data-time="120"><span class="num">120</span><span class="lbl">sec</span></button>
  </div>

  <!-- Word count (hidden in time mode) -->
  <p class="row-label" id="wc-label">Word count</p>
  <div class="sel-row" id="wc-row">
    <button class="sel-btn num-btn"        data-wc="10"><span class="num">10</span><span class="lbl">words</span></button>
    <button class="sel-btn num-btn active" data-wc="25"><span class="num">25</span><span class="lbl">words</span></button>
    <button class="sel-btn num-btn"        data-wc="50"><span class="num">50</span><span class="lbl">words</span></button>
    <button class="sel-btn num-btn"        data-wc="75"><span class="num">75</span><span class="lbl">words</span></button>
    <button class="sel-btn num-btn"        data-wc="100"><span class="num">100</span><span class="lbl">words</span></button>
  </div>

  <!-- #start must exist because style.css targets it.
       We put only the generate button here — slider hidden via CSS -->
  <div id="start">
    <button id="startbtn">Generate text</button>
  </div>

</div><!-- /#controls-wrap -->

<!-- Progress bar -->
<div id="progressbar-wrap">
  <progress id="progressbar" value="0" max="100"></progress>
</div>

<!-- Online opponent progress -->
<div id="opponent-panel" class="online-only">
  <div id="opponent-top">
    <span>Opponent</span>
    <span id="opponent-state">Waiting</span>
  </div>
  <div id="opponent-bar"><span id="opponent-fill"></span></div>
  <p id="opponent-meta">Join the same room on another device.</p>
</div>

<!-- Typing area -->
<p id="maintext"></p>

<!-- THE REAL INPUT — style.css sets display:none on #inputbox
     We override it above with display:block !important + off-screen position -->
<input id="inputbox" type="text"
  autocomplete="off" autocorrect="off" autocapitalize="off"
  spellcheck="false" aria-label="Typing input">

<p id="tab-hint"><kbd>Tab</kbd> = restart &nbsp;·&nbsp; click text to focus</p>

<!-- Results popup -->
<div id="popup">
  <h2 class="result-title">RESULTS</h2>
  <p id="w"></p>
  <p id="acc"></p>
  <p id="err"></p>
  <p id="maxs"></p>
  <div id="wpm-chart-wrap">
    <canvas id="wpm-chart" width="380" height="72"></canvas>
  </div>
  <div id="popup-actions">
    <button id="done"><span>Close</span></button>
    <button id="restart-btn">↺ Restart</button>
  </div>
</div>

<!-- Backdrop (separate div — never conflicts with body::before scanlines) -->
<div id="backdrop"></div>

<!-- ============================================================
     TITLE SCRAMBLE
     ============================================================ -->
<script>
(function(){
  const ALPHA = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
  const el   = document.getElementById("title");
  const orig = el.innerText;
  let it = 0;
  const iv = setInterval(()=>{
    el.innerText = orig.split("").map((c,i)=>
      i < it ? orig[i] : ALPHA[Math.floor(Math.random()*26)]
    ).join("");
    it += 0.22;
    if(it >= orig.length) clearInterval(iv);
  }, 45);
  gsap.from("#title",{y:-40,opacity:0,duration:1,ease:"power3.out"});
})();
</script>

<!-- ============================================================
     GAME ENGINE
     ============================================================ -->
<script>
(function(){
"use strict";

/* ── Helpers ──────────────────────────────────────── */
const $  = id => document.getElementById(id);
const $$ = (sel, ctx) => (ctx||document).querySelectorAll(sel);

/* ── Audio ────────────────────────────────────────── */
let _ac = null;
function getAC(){
  if(!_ac) _ac = new (window.AudioContext||window.webkitAudioContext)();
  return _ac;
}
function tone(freq, type, vol, dur){
  try{
    const ac = getAC();
    const o  = ac.createOscillator();
    const g  = ac.createGain();
    o.type = type||"sine";
    o.frequency.value = freq;
    o.connect(g); g.connect(ac.destination);
    g.gain.setValueAtTime(vol, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime+dur);
    o.start(); o.stop(ac.currentTime+dur+0.01);
  }catch(e){}
}
function sndKey()  { tone(1100,"sine",    0.025, 0.04); }
function sndErr()  { tone(180, "sawtooth",0.055, 0.12); }
function sndDone() {
  [523,659,784,1047].forEach((f,i)=> setTimeout(()=>tone(f,"sine",0.08,0.35),i*100));
}

/* ── DOM refs ─────────────────────────────────────── */
const inputbox   = $("inputbox");
const maintext   = $("maintext");
const progressEl = $("progressbar");
const popup      = $("popup");
const backdrop   = $("backdrop");
const liveWpm    = $("live-wpm");
const liveTimer  = $("live-timer");
const liveAcc    = $("live-acc");
const hisBtn     = $("his");
const hisList    = $("historyList");
const wcRow        = $("wc-row");
const wcLabel      = $("wc-label");
const controlsWrap = $("controls-wrap");
const matchRow     = $("match-row");
const roomInput    = $("room-code");
const joinRoomBtn  = $("join-room");
const onlineStatus = $("online-status");
const opponentState = $("opponent-state");
const opponentFill  = $("opponent-fill");
const opponentMeta  = $("opponent-meta");

/* ── State ────────────────────────────────────────── */
let spans      = [];
let idx        = 0;
let correct    = 0;
let errors     = 0;
let total      = 0;
let startTime  = null;
let started    = false;
let liveTick   = null;
let cdownTick  = null;
let wpmLog     = [];
let wordCount  = 25;
let timeMode   = 0;
let difficulty = "easy";
let allMax     = parseFloat(localStorage.getItem("tw_max")||"0");
let matchMode  = "solo";
let socket     = null;
let socketReady = false;
let playerId   = null;
let roomCode   = "TYPEWAR";
let playerName = localStorage.getItem("tw_player_name");
if(!playerName){
  playerName = "Player " + Math.floor(100 + Math.random() * 900);
  localStorage.setItem("tw_player_name", playerName);
}

/* ── Word banks ───────────────────────────────────── */
const BANKS = {
  easy:   "the and you that was for are with his they this have from one had word but not what all were when your can said there use each which she do how their if will up other about out many then them these so some her would make like time into has look two more write go see number no way could people my than first water been call who its now find long down day did get come made may part over new sound take only little work know place year live me back give most very after thing our just name good man think say great where help through much before line right too mean old any same tell boy follow came want show also around form three small set put end does another well large must big even such because turn here why ask went men read need land different home us move try kind hand again change off play air away animal house point page letter mother answer found".split(" "),
  medium: "language between important something together following children mountain sentence different complete problem example another through because country without question thought usually friends surface against already nothing however whether several control morning process special provide feeling account product quality quickly service started support teacher testing tonight towards village working younger remember consider probably thousand previous actually possible national personal specific similar general certain program subject instead perhaps respect section simple single become believe himself student western written forward history hundred".split(" "),
  code:   "function const let var return async await import export default class extends interface boolean string number undefined null true false typeof instanceof forEach filter reduce map push pop slice splice indexOf includes callback promise resolve reject console log setTimeout setInterval document querySelector addEventListener preventDefault createElement appendChild innerHTML className getAttribute setAttribute localStorage JSON parse stringify Array Object keys values entries Math floor ceil random parseInt parseFloat try catch finally throw new this prototype constructor switch case break continue while module require typescript abstract readonly override static private public".split(" ")
};
function randWords(n){
  const b = BANKS[difficulty];
  return Array.from({length:n}, ()=> b[Math.floor(Math.random()*b.length)]).join(" ");
}

function setActive(row, key, value){
  $$(".sel-btn", row).forEach(btn=>{
    btn.classList.toggle("active", btn.dataset[key] === String(value));
  });
}

function getSettings(){
  return { difficulty, timeMode, wordCount };
}

function applySettings(settings){
  if(!settings) return;
  if(settings.difficulty && BANKS[settings.difficulty]){
    difficulty = settings.difficulty;
    setActive($("diff-row"), "diff", difficulty);
  }
  if(Number.isFinite(settings.timeMode)){
    timeMode = settings.timeMode;
    setActive($("time-row"), "time", timeMode);
    const show = timeMode === 0;
    wcRow.style.display   = show ? "flex"  : "none";
    wcLabel.style.display = show ? "block" : "none";
  }
  if(Number.isFinite(settings.wordCount)){
    wordCount = settings.wordCount;
    setActive(wcRow, "wc", wordCount);
  }
}

/* ── Selectors ────────────────────────────────────── */
// Difficulty
$$(".sel-btn", $("diff-row")).forEach(btn=>{
  btn.addEventListener("click", ()=>{
    $$(".sel-btn", $("diff-row")).forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    difficulty = btn.dataset.diff;
  });
});

// Time mode
$$(".sel-btn", $("time-row")).forEach(btn=>{
  btn.addEventListener("click", ()=>{
    $$(".sel-btn", $("time-row")).forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    timeMode = parseInt(btn.dataset.time);
    const show = timeMode === 0;
    wcRow.style.display   = show ? "flex"  : "none";
    wcLabel.style.display = show ? "block" : "none";
  });
});

// Word count
$$(".sel-btn", wcRow).forEach(btn=>{
  btn.addEventListener("click", ()=>{
    $$(".sel-btn", wcRow).forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    wordCount = parseInt(btn.dataset.wc);
  });
});

/* ── Online multiplayer ───────────────────────────── */
function cleanRoom(value){
  return (value || "TYPEWAR").toUpperCase().replace(/[^A-Z0-9_-]/g, "").slice(0, 16) || "TYPEWAR";
}

function setOnlineStatus(text, isError){
  onlineStatus.textContent = text;
  onlineStatus.classList.toggle("error", !!isError);
}

function setMatchMode(mode){
  matchMode = mode === "online" ? "online" : "solo";
  setActive(matchRow, "match", matchMode);
  document.body.classList.toggle("online-mode", matchMode === "online");
  if(matchMode === "solo") setOnlineStatus("Not connected", false);
}

function wsEndpoint(){
  const protocol = location.protocol === "https:" ? "wss:" : "ws:";
  const host = location.host || "localhost:8080";
  return `${protocol}//${host}/ws`;
}

function sendOnline(type, payload){
  if(!socket || socket.readyState !== WebSocket.OPEN) return;
  socket.send(JSON.stringify(Object.assign({ type }, payload || {})));
}

function resetOpponent(){
  opponentState.textContent = "Waiting";
  opponentFill.style.width = "0%";
  opponentMeta.textContent = "Join the same room on another device.";
}

function updateOpponent(state){
  if(!state) return resetOpponent();
  const pct = Math.max(0, Math.min(100, Number(state.progress || 0) * 100));
  const accuracy = Number.isFinite(Number(state.accuracy)) ? Number(state.accuracy) : 100;
  opponentFill.style.width = pct.toFixed(1) + "%";
  opponentState.textContent = state.finished ? "Finished" : (state.started ? "Racing" : "Ready");
  opponentMeta.textContent = `${Math.round(state.wpm || 0)} WPM · ${accuracy.toFixed(1)}% · ${state.errors || 0} errors`;
}

function updateRoom(players){
  const peers = (players || []).filter(player => player.id !== playerId);
  if(peers.length){
    setOnlineStatus(`Room ${roomCode}: connected with ${peers[0].name}.`, false);
  } else {
    setOnlineStatus(`Room ${roomCode}: waiting for opponent...`, false);
    resetOpponent();
  }
}

function disconnectOnline(){
  const old = socket;
  socket = null;
  socketReady = false;
  playerId = null;
  if(old) old.close();
  resetOpponent();
}

function connectRoom(){
  if(!window.WebSocket){
    setOnlineStatus("This browser does not support WebSocket.", true);
    return;
  }

  setMatchMode("online");
  roomCode = cleanRoom(roomInput.value);
  roomInput.value = roomCode;
  localStorage.setItem("tw_room", roomCode);

  if(socket) disconnectOnline();

  const ws = new WebSocket(wsEndpoint());
  socket = ws;
  socketReady = false;
  setOnlineStatus(`Connecting to ${roomCode}...`, false);

  ws.addEventListener("open", ()=>{
    if(socket !== ws) return;
    sendOnline("join", { room: roomCode, name: playerName });
  });

  ws.addEventListener("message", event=>{
    if(socket !== ws) return;
    let msg = null;
    try{ msg = JSON.parse(event.data); }catch(e){ return; }
    if(msg.type === "joined"){
      playerId = msg.playerId;
      roomCode = msg.room || roomCode;
      roomInput.value = roomCode;
      socketReady = true;
      updateRoom(msg.players);
    } else if(msg.type === "room"){
      updateRoom(msg.players);
    } else if(msg.type === "race" && typeof msg.text === "string"){
      startSharedGame(msg.text, msg.settings, true);
      setOnlineStatus(`Room ${roomCode}: race started.`, false);
    } else if(msg.type === "state"){
      updateOpponent(msg.state);
    } else if(msg.type === "peer-left"){
      setOnlineStatus(`Room ${roomCode}: opponent left.`, false);
      resetOpponent();
    } else if(msg.type === "error"){
      socketReady = false;
      setOnlineStatus(msg.message || "Multiplayer error.", true);
    }
  });

  ws.addEventListener("close", ()=>{
    if(socket !== ws) return;
    socketReady = false;
    playerId = null;
    setOnlineStatus("Disconnected. Run the server and join again.", true);
    resetOpponent();
  });

  ws.addEventListener("error", ()=>{
    if(socket !== ws) return;
    setOnlineStatus("Could not connect to the WebSocket server.", true);
  });
}

function localRaceState(finished){
  const elapsed = startTime ? (Date.now() - startTime) / 1000 : 0;
  const wpm = elapsed > 0 ? (correct / 5) / (elapsed / 60) : 0;
  const accuracy = total === 0 ? 100 : (correct / total) * 100;
  return {
    progress: spans.length ? idx / spans.length : 0,
    wpm: Math.round(wpm),
    accuracy: parseFloat(accuracy.toFixed(1)),
    errors,
    started,
    finished: !!finished,
    elapsed: parseFloat(elapsed.toFixed(1))
  };
}

function publishRaceState(finished){
  if(matchMode !== "online" || !socketReady) return;
  sendOnline("state", { state: localRaceState(finished) });
}

$$(".sel-btn", matchRow).forEach(btn=>{
  btn.addEventListener("click", ()=>{
    if(btn.dataset.match === "online"){
      connectRoom();
    } else {
      disconnectOnline();
      setMatchMode("solo");
    }
  });
});

joinRoomBtn.addEventListener("click", connectRoom);
roomInput.addEventListener("keydown", e=>{
  if(e.key === "Enter"){
    e.preventDefault();
    connectRoom();
  }
});

/* ── Focus management ─────────────────────────────── */
// CRITICAL: the real input must always hold focus when game is active
function focusInput(){
  inputbox.focus({ preventScroll:true });
}

// Click on text → focus input
maintext.addEventListener("mousedown", e=>{
  e.preventDefault(); // don't let mousedown steal focus from input
  focusInput();
});

// Any click on page → keep input focused if game running
document.addEventListener("click", ()=>{
  if(spans.length > 0) focusInput();
});

// If input somehow loses focus → reclaim it
inputbox.addEventListener("blur", ()=>{
  if(spans.length > 0){
    setTimeout(focusInput, 0);
  }
});

/* ── Controls visibility ──────────────────────────── */
function collapseControls(){
  controlsWrap.classList.add("collapsed");
}
function restoreControls(){
  controlsWrap.classList.remove("collapsed");
}

/* ── Game lifecycle ───────────────────────────────── */
function reset(){
  clearInterval(liveTick);
  clearInterval(cdownTick);
  idx=0; correct=0; errors=0; total=0;
  startTime=null; started=false;
  spans=[]; wpmLog=[];
  maintext.innerHTML = "";
  inputbox.value     = "";
  progressEl.value   = 0;
  liveWpm.textContent   = "— WPM";
  liveTimer.textContent = "0.0s";
  liveAcc.textContent   = "— %";
  restoreControls();   // bring controls back when resetting
}

function buildSpans(text){
  const frag = document.createDocumentFragment();
  [...text].forEach((ch, i)=>{
    const sp = document.createElement("span");
    sp.textContent = ch;
    if(i === 0) sp.classList.add("current"); // first char gets cursor immediately
    frag.appendChild(sp);
  });
  maintext.appendChild(frag);
  spans = maintext.querySelectorAll("span");
}

function startSharedGame(text, settings, fromRemote){
  reset();
  applySettings(settings);
  collapseControls();  // smooth fade+collapse after generation
  resetOpponent();
  buildSpans(text);
  if(fromRemote) publishRaceState(false);
  focusInput();
}

function startGame(){
  if(matchMode === "online" && !socketReady){
    setOnlineStatus("Join a room before starting an online race.", true);
    return;
  }

  const n = timeMode > 0 ? Math.max(120, timeMode * 4) : wordCount;
  const text = randWords(n);
  const settings = getSettings();
  startSharedGame(text, settings, false);
  if(matchMode === "online"){
    sendOnline("race", { text, settings });
    publishRaceState(false);
  }
}

$("startbtn").addEventListener("click", startGame);

/* ── Live stats ───────────────────────────────────── */
function tickStats(){
  if(!started || !startTime) return;
  const elapsed = (Date.now()-startTime)/1000;
  if(timeMode === 0) liveTimer.textContent = elapsed.toFixed(1)+"s";
  if(elapsed > 0){
    const wpm = (correct/5)/(elapsed/60);
    liveWpm.textContent = Math.round(wpm)+" WPM";
    wpmLog.push(Math.round(wpm));
  }
  const pct = total===0 ? 100 : (correct/total)*100;
  liveAcc.textContent = pct.toFixed(1)+"%";
  publishRaceState(false);
}

function startCountdown(){
  let rem = timeMode;
  liveTimer.textContent = rem+"s";
  cdownTick = setInterval(()=>{
    rem--;
    liveTimer.textContent = rem+"s";
    progressEl.value = ((timeMode-rem)/timeMode)*100;
    publishRaceState(false);
    if(rem <= 0){ clearInterval(cdownTick); endGame(); }
  }, 1000);
}

/* ── Keyboard ─────────────────────────────────────── */
inputbox.addEventListener("keydown", e=>{
  if(spans.length === 0) return;

  // Tab → instant restart
  if(e.key === "Tab"){
    e.preventDefault();
    startGame();
    return;
  }

  // Backspace
  if(e.key === "Backspace"){
    e.preventDefault();
    if(idx > 0){
      spans[idx].classList.remove("current");        // remove cursor from current
      idx--;
      if(spans[idx].classList.contains("correct"))  correct--;
      else if(spans[idx].classList.contains("wrong")) errors--;
      total = Math.max(0, total-1);
      spans[idx].classList.remove("correct","wrong");
      spans[idx].classList.add("current");           // restore cursor to previous char
      updateProgress();
      publishRaceState(false);
    }
    return;
  }

  // Ignore modifier / special keys
  if(e.key.length !== 1) return;
  if(idx >= spans.length) return;

  // Start timer on first keystroke
  if(!started){
    startTime = Date.now();
    started   = true;
    liveTick  = setInterval(tickStats, 250);
    if(timeMode > 0) startCountdown();
  }

  total++;
  const expected = spans[idx].textContent;

  spans[idx].classList.remove("current");            // move cursor off this char

  if(e.key === expected){
    spans[idx].classList.add("correct");
    correct++;
    sndKey();
  } else {
    spans[idx].classList.add("wrong");
    errors++;
    sndErr();
  }

  idx++;
  if(idx < spans.length) spans[idx].classList.add("current"); // cursor → next char

  updateProgress();
  publishRaceState(false);
  if(timeMode === 0 && idx >= spans.length) endGame();
});

function updateProgress(){
  if(timeMode > 0 || !spans.length) return;
  progressEl.value = (idx/spans.length)*100;
}

/* ── End game ─────────────────────────────────────── */
function endGame(){
  clearInterval(liveTick);
  clearInterval(cdownTick);
  if(!startTime) return;
  const elapsed = (Date.now()-startTime)/1000;
  const wpm     = (correct/5) / Math.max(elapsed/60, 1/60);
  if(wpm > allMax){
    allMax = wpm;
    localStorage.setItem("tw_max", allMax.toFixed(1));
  }
  sndDone();
  saveToHistory(wpm);
  publishRaceState(true);
  showPopup(wpm);
}

/* ── Popup ────────────────────────────────────────── */
function showPopup(wpm){
  const acc = total===0 ? 100 : (correct/total)*100;
  $("w").innerHTML    = `<span class="stat-label">WPM</span><span class="stat-val">${Math.round(wpm)}</span>`;
  $("acc").innerHTML  = `<span class="stat-label">Accuracy</span><span class="stat-val">${acc.toFixed(1)}%</span>`;
  $("err").innerHTML  = `<span class="stat-label">Errors</span><span class="stat-val err">${errors}</span>`;
  $("maxs").innerHTML = `<span class="stat-label">Best ever</span><span class="stat-val best">${Math.round(allMax)} WPM</span>`;
  drawChart();
  popup.classList.add("show");
  backdrop.classList.add("show");
}

function closePopup(){
  popup.classList.remove("show");
  backdrop.classList.remove("show");
  restoreControls();   // always bring controls back when dismissing results
}

$("done").addEventListener("click", closePopup);
$("restart-btn").addEventListener("click", ()=>{ closePopup(); startGame(); });
backdrop.addEventListener("click", closePopup);

/* ── WPM Chart ────────────────────────────────────── */
function drawChart(){
  const cv = $("wpm-chart");
  const cx = cv.getContext("2d");
  const W = cv.width, H = cv.height;
  cx.clearRect(0,0,W,H);

  // thin samples so line isn't too dense
  const step = Math.max(1, Math.floor(wpmLog.length/60));
  const s = wpmLog.filter((_,i)=> i%step===0);
  if(s.length < 2){ cv.parentElement.style.display="none"; return; }
  cv.parentElement.style.display="block";

  const maxV = Math.max(...s, 1);
  const dx   = W/(s.length-1);

  cx.strokeStyle="#00e87a"; cx.lineWidth=2;
  cx.shadowColor="#00e87a"; cx.shadowBlur=8;
  cx.beginPath();
  s.forEach((v,i)=>{
    const x=i*dx, y=H-(v/maxV)*(H-14)-7;
    i===0 ? cx.moveTo(x,y) : cx.lineTo(x,y);
  });
  cx.stroke();

  cx.shadowBlur=0;
  cx.fillStyle="rgba(0,232,122,0.07)";
  cx.lineTo(W,H); cx.lineTo(0,H); cx.closePath(); cx.fill();
}

/* ── History ──────────────────────────────────────── */
function saveToHistory(wpm){
  const acc = total===0 ? 100 : (correct/total)*100;
  let hist = JSON.parse(localStorage.getItem("tw_hist")||"[]");
  hist.unshift({
    wpm:    Math.round(wpm),
    acc:    parseFloat(acc.toFixed(1)),
    errors,
    diff:   difficulty,
    mode:   timeMode>0 ? timeMode+"s" : wordCount+" words",
    time:   new Date().toLocaleTimeString()
  });
  if(hist.length > 20) hist = hist.slice(0,20);
  localStorage.setItem("tw_hist", JSON.stringify(hist));
}

function renderHistory(){
  const hist = JSON.parse(localStorage.getItem("tw_hist")||"[]");
  hisList.innerHTML = "";
  if(!hist.length){
    hisList.innerHTML = "<li style='color:var(--text-muted);padding:8px 12px'>No history yet</li>";
    return;
  }
  hist.forEach(e=>{
    const li = document.createElement("li");
    li.innerHTML = `<strong style="color:var(--accent)">${e.wpm} WPM</strong> · ${e.acc}% · ${e.errors} err · <em>${e.diff}</em> · ${e.mode} · ${e.time}`;
    hisList.appendChild(li);
  });
}

hisBtn.addEventListener("click", ()=>{
  const open = hisList.style.display === "block";
  hisList.style.display = open ? "none" : "block";
  if(!open) renderHistory();
});

const bootParams = new URLSearchParams(window.location.search);
roomInput.value = cleanRoom(bootParams.get("room") || localStorage.getItem("tw_room") || roomInput.value);
if(bootParams.get("online") === "1"){
  connectRoom();
} else {
  setMatchMode("solo");
  resetOpponent();
}

renderHistory();

})();
</script>
